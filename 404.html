<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Haproven</title>

  <meta name="description"
    content="Oops! The page you are looking for on Haproven does not exist. Navigate back to home.">
    
  <script src="/Assets/JS/main/meta.js"></script>


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f1d2a, #020617);
      background: linear-gradient(135deg, #0f1d2a, #020617);
      background: radial-gradient(circle at top left, #110726f0, #020617);

      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      text-align: center;
      position: relative;
    }

    /* background glow */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: rgba(56, 191, 248, 0.367);
      top: -100px;
      left: -100px;
    }

    body::after {
      width: 350px;
      height: 350px;
      /* background: rgba(37, 99, 235, 0.15); */
      bottom: -100px;
      right: -100px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 20px;
      z-index: 1;
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: clamp(64px, 15vw, 110px);
      font-weight: 900;
      color: #38bdf8;
      margin-bottom: 16px;
    }

    h2 {
      font-size: clamp(20px, 5vw, 28px);
      margin-bottom: 16px;
    }

    p {
      font-size: clamp(14px, 4vw, 16px);
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: all .3s ease;
    }

    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, .4);
    }

    .small {
      margin-top: 20px;
      font-size: 14px;
      color: #94a3b8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>
      The page you are looking for might have been removed,
      had its name changed, or is temporarily unavailable.
    </p>
    <a href="/">Go Back Home</a>
    <p class="small">You will be redirected automatically in 10 seconds.</p>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "/";
    }, 10000);
  </script>
</body>

</html>
