  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: rgba(0, 0, 0, .3);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      background: #00e676;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>📲 Vishnupur SMR App</h1>
    <p>अपने मोबाइल में ऐप इंस्टॉल करें</p>
    <button id="installBtn">Add to Home Screen</button>
  </div>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    };
  </script>

</body>
